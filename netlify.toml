# Netlify configuration.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Secrets scanning false positive.
  #
  # The build embeds no secret VALUES — every secret is read from process.env at
  # runtime via lazy getters in src/lib/env.ts, never inlined. Verified: none of
  # the actual values (GOCSPX-…, sb_secret_…, the token key) appear anywhere in
  # .next, client OR server. What the scanner catches is the variable-NAME
  # strings ("GOOGLE_CLIENT_ID", etc.), which appear only inside required()'s
  # error messages, and which it flags as a hint the value might be nearby.
  #
  # These three Google keys are omitted from scanning:
  #   - GOOGLE_CLIENT_ID and GOOGLE_REDIRECT_URI aren't secret at all — the OAuth
  #     client id and callback URL are public in every sign-in flow.
  #   - GOOGLE_CLIENT_SECRET is sensitive, but its value provably isn't in the
  #     build; only its harmless name-string is. Omitting the key clears the
  #     false positive.
  #
  # Deliberately NOT omitted, so a real leak still fails the build:
  # SUPABASE_SECRET_KEY and TOKEN_ENCRYPTION_KEY — the two keys whose exposure
  # would actually be dangerous. Scanning stays fully active for both.
  SECRETS_SCAN_OMIT_KEYS = "GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI"
